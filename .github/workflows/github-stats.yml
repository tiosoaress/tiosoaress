name: Update GitHub Stats

on:
  schedule:
    - cron: "0 */6 * * *"   # Roda a cada 6 horas
  workflow_dispatch:          # Permite execução manual
  push:
    branches:
      - main

jobs:
  update-stats:
    name: Update README Stats
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update GitHub Stats via github-readme-stats
        env:
          GH_TOKEN: ${{ secrets.GH_STATS_TOKEN }}
        run: |
          echo "Stats atualizado em: $(date)" >> stats_log.txt

      - name: Generate Snake Animation
        uses: Platane/snk@v3
        with:
          github_user_name: tiosoaress
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GH_STATS_TOKEN }}

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update github stats and snake animation [skip ci]"
          file_pattern: dist/ stats_log.txt
