name: Update GitHub Stats

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  update-stats:
    name: Update README Stats
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update stats
        env:
          GH_TOKEN: ${{ secrets.GH_STATS_TOKEN }}
        run: echo "Stats atualizado em $(date)" >> stats_log.txt

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update github stats [skip ci]"
